<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дашборд производства 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
        
        :root {
            --bg: #f5f6fa; --bg2: #ffffff; --border: rgba(0,0,0,0.08);
            --text: #1a1d23; --text2: #5a6070; --blue: #0061ff;
            --green: #1a9e3f; --red: #d93025;
        }

        body { 
            font-family: 'IBM Plex Sans', sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: 20px; 
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        
        .f-btn {
            padding: 8px 16px; border: 1px solid var(--border);
            background: var(--bg2); cursor: pointer; border-radius: 8px;
            font-size: 14px; transition: 0.2s;
        }
        .f-btn.active { background: var(--blue); color: white; border-color: var(--blue); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--bg2); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .kpi-val { font-size: 24px; font-weight: 600; margin: 8px 0; }
        .percent { font-size: 14px; padding: 2px 8px; border-radius: 4px; }
        .plus { background: #e6f4ea; color: var(--green); }
        .minus { background: #fce8e6; color: var(--red); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th { text-align: left; color: var(--text2); padding: 8px; border-bottom: 1px solid var(--border); }
        td { padding: 8px; border-bottom: 1px solid var(--border); }
        
        #status { font-size: 12px; color: var(--text3); }
    </style>
</head>
<body>

<div class="header">
    <h1>Производство 2026</h1>
    <div id="status">Загрузка...</div>
</div>

<div class="filters" id="month-btns">
    <button class="f-btn active" onclick="setMonth('all', this)">Весь год</button>
    </div>

<div class="grid" id="kpi-container">
    <div class="card">
        <div style="color:var(--text2)">Валовый надой (литр)</div>
        <div id="kpi-milk" class="kpi-val">0</div>
        <div id="pct-milk" class="percent">0% от плана</div>
    </div>
    <div class="card">
        <div style="color:var(--text2)">Реализовано ГП (кг)</div>
        <div id="kpi-sales" class="kpi-val">0</div>
        <div id="pct-sales" class="percent">0% от плана</div>
    </div>
</div>

<div class="grid" style="margin-top:20px;">
    <div class="card" style="grid-column: span 2;">
        <h3>Динамика надоев (план / факт)</h3>
        <canvas id="mainChart" height="100"></canvas>
    </div>
    <div class="card">
        <h3>Топ продуктов (продажи кг)</h3>
        <div id="top-products"></div>
    </div>
</div>

<script>
// ЗАМЕНИТЕ ЭТУ ССЫЛКУ НА ВАШ SCRIPT URL ИЗ GOOGLE APPS SCRIPT
const SCRIPT_URL = 'ВАШ_URL_ЗДЕСЬ'; 

let db = [];
let currentMonth = 'all';

// Маппинг для кнопок (должен совпадать с колонкой "месяц" в БД)
const MONTH_ORDER = ['янв.', 'февр.', 'мар.', 'апр.', 'мая', 'июн.', 'июл.', 'авг.', 'сент.', 'окт.', 'нояб.', 'дек.'];
const MONTH_MAP = {
    'янв.': 'Январь', 'февр.': 'Февраль', 'мар.': 'Март', 'апр.': 'Апрель',
    'мая': 'Май', 'июн.': 'Июнь', 'июл.': 'Июль', 'авг.': 'Август'
};

// Исправленный парсинг даты
function parseDate(str) {
    if (!str) return null;
    const d = new Date(str);
    return isNaN(d.getTime()) ? null : d;
}

async function loadData() {
    try {
        const res = await fetch(SCRIPT_URL);
        const data = await res.json();
        
        // Преобразуем данные и фиксируем месяц
        db = data.map(row => ({
            ...row,
            val: parseFloat(row["Валовый надой, литр"]) || 0,
            plan: parseFloat(row["план"]) || 0, // Убедитесь что в БД колонка называется так
            sales: parseFloat(row["Реализовано ГП кг"]) || 0,
            monthLabel: row["месяц"] // Берем напрямую из таблицы (янв., февр. и т.д.)
        }));

        updateFilters();
        render();
        document.getElementById('status').innerText = 'Обновлено: ' + new Date().toLocaleTimeString();
    } catch (e) {
        document.getElementById('status').innerText = 'Ошибка загрузки';
        console.error(e);
    }
}

function updateFilters() {
    const container = document.getElementById('month-btns');
    // Находим все уникальные месяцы в данных
    const foundMonths = [...new Set(db.map(r => r.monthLabel))].filter(m => m);
    
    // Сортируем их по календарному порядку
    foundMonths.sort((a, b) => MONTH_ORDER.indexOf(a) - MONTH_ORDER.indexOf(b));

    let html = `<button class="f-btn ${currentMonth === 'all' ? 'active' : ''}" onclick="setMonth('all', this)">Весь год</button>`;
    foundMonths.forEach(m => {
        html += `<button class="f-btn ${currentMonth === m ? 'active' : ''}" onclick="setMonth('${m}', this)">${MONTH_MAP[m] || m}</button>`;
    });
    container.innerHTML = html;
}

function setMonth(m, btn) {
    currentMonth = m;
    document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
}

function render() {
    const filtered = currentMonth === 'all' ? db : db.filter(r => r.monthLabel === currentMonth);

    // Считаем KPI
    const totalMilk = filtered.reduce((s, r) => s + r.val, 0);
    const planMilk = filtered.reduce((s, r) => s + (parseFloat(r["план"]) || 0), 0);
    const totalSales = filtered.reduce((s, r) => s + r.sales, 0);

    document.getElementById('kpi-milk').innerText = totalMilk.toLocaleString() + ' л';
    document.getElementById('kpi-sales').innerText = totalSales.toLocaleString() + ' кг';

    const milkPct = planMilk > 0 ? Math.round((totalMilk / planMilk) * 100) : 0;
    const milkEl = document.getElementById('pct-milk');
    milkEl.innerText = milkPct + '% от плана';
    milkEl.className = 'percent ' + (milkPct >= 100 ? 'plus' : 'minus');

    updateChart(filtered);
}

let chartObj = null;
function updateChart(data) {
    const ctx = document.getElementById('mainChart').getContext('2d');
    if (chartObj) chartObj.destroy();

    // Группируем по датам для графика
    const labels = [...new Set(data.map(r => r["Дата"]))].slice(-31); // последние 31 запись
    const factData = labels.map(l => data.filter(r => r["Дата"] === l).reduce((s, r) => s + r.val, 0));
    const planData = labels.map(l => data.filter(r => r["Дата"] === l).reduce((s, r) => s + (parseFloat(r["план"]) || 0), 0));

    chartObj = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels.map(l => l.split('-').slice(2).join('.')), // только число
            datasets: [
                { label: 'Факт', data: factData, borderColor: '#0061ff', tension: 0.3, fill: true, backgroundColor: 'rgba(0,97,255,0.05)' },
                { label: 'План', data: planData, borderColor: '#ccc', borderDash: [5,5], tension: 0.3 }
            ]
        },
        options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
    });
}

// Запуск
loadData();
// Автообновление каждые 5 минут
setInterval(loadData, 300000);

</script>
</body>
</html>
