<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1a73e8; --bg: #f8f9fa; --card: #ffffff; --text: #3c4043;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
    .tab { padding: 10px 20px; cursor: pointer; border-radius: 8px; font-weight: 600; background: #eee; }
    .tab.active { background: var(--primary); color: white; }
    
    .filters { display: flex; gap: 15px; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
    select, button { padding: 8px 12px; border-radius: 6px; border: 1px solid #dadce0; font-size: 14px; }
    .btn-ytd { background: var(--primary); color: white; border: none; cursor: pointer; }

    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .kpi-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-top: 4px solid var(--primary); }
    .kpi-title { font-size: 13px; color: #70757a; margin-bottom: 8px; }
    .kpi-value { font-size: 24px; font-weight: 700; }
    .kpi-plan { font-size: 12px; margin-top: 5px; }
    .trend-up { color: #1e8e3e; } .trend-down { color: #d93025; }

    .content-section { display: none; }
    .content-section.active { display: block; }
    
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; }
    th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
    th { background: #f1f3f4; font-weight: 600; }
    
    .loader { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); display:flex; justify-content:center; align-items:center; z-index:100; }
  </style>
</head>
<body>

<div id="loader" class="loader">Загрузка данных...</div>

<div class="header">
  <h2>MOLOKO.PRO: Сводный Дашборд</h2>
  <div class="filters">
    <select id="farmFilter" onchange="updateDashboard()">
      <option value="all">Все фермы</option>
      <option value="Astana onim">Astana onim</option>
      <option value="Burabay milk">Burabay milk</option>
    </select>
    <select id="monthFilter" onchange="updateDashboard()">
      <option value="all">Весь период</option>
    </select>
    <button class="btn-ytd" onclick="setYTD()">С начала года</button>
  </div>
</div>

<div class="nav-tabs">
  <div class="tab active" onclick="switchTab('production', this)">🚜 Производство</div>
  <div class="tab" onclick="switchTab('processing', this)">🏗 Переработка</div>
  <div class="tab" onclick="switchTab('finance', this)">💰 Финансы</div>
</div>

<div id="production" class="content-section active">
  <div class="kpi-grid" id="kpiProduction">
    </div>
  <div id="chartContainer">
    <p style="text-align: center; color: #777;">[Здесь будет визуализация графиков из БД]</p>
  </div>
</div>

<div id="processing" class="content-section">
  <div class="kpi-grid" id="kpiProcessing"></div>
  <table>
    <thead><tr><th>Показатель</th><th>Факт</th><th>План</th><th>Исполнение</th></tr></thead>
    <tbody id="processingTable"></tbody>
  </table>
</div>

<div id="finance" class="content-section">
  <div class="kpi-grid" id="kpiFinance"></div>
  <div style="background: white; padding: 20px; border-radius: 12px;">
    <h3>Сравнение Факт к Факту</h3>
    <div id="financeComparison"></div>
  </div>
</div>

<script>
let rawData = [];
let headers = [];

window.onload = function() {
  google.script.run.withSuccessHandler(function(response) {
    rawData = response.rows;
    headers = response.headers;
    populateFilters();
    updateDashboard();
    document.getElementById('loader').style.display = 'none';
  }).getDashboardData();
};

function populateFilters() {
  const monthIdx = headers.indexOf('Месяц');
  const months = [...new Set(rawData.map(r => r[monthIdx]))];
  const select = document.getElementById('monthFilter');
  months.forEach(m => {
    let opt = document.createElement('option');
    opt.value = m; opt.innerText = m;
    select.appendChild(opt);
  });
}

function switchTab(tabId, el) {
  document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  el.classList.add('active');
}

function updateDashboard() {
  const farm = document.getElementById('farmFilter').value;
  const month = document.getElementById('monthFilter').value;
  const farmIdx = headers.indexOf('Ферма');
  const monthIdx = headers.indexOf('Месяц');

  // Фильтрация
  const filtered = rawData.filter(r => {
    const matchFarm = (farm === 'all' || r[farmIdx] === farm);
    const matchMonth = (month === 'all' || r[monthIdx] === month);
    return matchFarm && matchMonth;
  });

  renderProduction(filtered);
  renderProcessing(filtered);
  renderFinance(filtered);
}

function renderProduction(data) {
  // Логика расчета KPI (Пример для валового надоя)
  const valFactIdx = headers.indexOf('Валовый надой литрах факт');
  const valPlanIdx = headers.indexOf('Валовый надой литрах план');
  
  let totalFact = 0, totalPlan = 0;
  data.forEach(r => {
    totalFact += Number(r[valFactIdx]) || 0;
    totalPlan += Number(r[valPlanIdx]) || 0;
  });

  const perc = totalPlan > 0 ? ((totalFact/totalPlan)*100).toFixed(1) : 0;
  
  document.getElementById('kpiProduction').innerHTML = `
    <div class="kpi-card">
      <div class="kpi-title">Валовый Надой, л</div>
      <div class="kpi-value">${totalFact.toLocaleString()}</div>
      <div class="kpi-plan">План: ${totalPlan.toLocaleString()} (${perc}%)</div>
    </div>
    `;
}

// Функции для остальных вкладок будут работать по такому же принципу фильтрации
function renderProcessing(data) { /* Расчет переработки */ }
function renderFinance(data) { /* Расчет финансов */ }

function setYTD() {
  document.getElementById('monthFilter').value = 'all';
  updateDashboard();
}
</script>
</body>
</html>
